# Hybrid persistence demo config (RDB snapshots + AOF log).
# Used by compose.persistence.yaml. See the persistence module README for the
# full guide. NOTE: Redis config does not allow inline comments after a value,
# so every comment is on its own line.

# --- AOF (append only file): low data loss ---
# Turn the append-only log on.
appendonly yes
# fsync once per second: at most ~1s of writes lost, balanced (the usual default).
appendfsync everysec
# AOF base is a compact RDB snapshot; the tail is the command log.
aof-use-rdb-preamble yes
appendfilename "appendonly.aof"
# Redis 7+ keeps the multi-part AOF in this directory.
appenddirname "appendonlydir"

# --- RDB (snapshots): fast recovery + easy backups ---
# Snapshot if: 1+ change in 900s, 10+ in 300s, or 10000+ in 60s.
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# All persistence files are written here. compose mounts ./data to this path,
# so the generated dump.rdb and appendonlydir/ show up on your host.
dir /data
