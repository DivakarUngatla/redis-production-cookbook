# Runnable Redis Cluster demo: 6 cluster-enabled nodes (becomes 3 masters + 3 replicas).
#
# Each node runs with cluster mode on and its own cluster-config-file. After the
# containers are up, ONE command forms the cluster and assigns the 16384 hash slots
# (see the README "Hands-On" section):
#
#   docker compose -f compose.cluster.yaml up -d
#   sleep 3
#   # form the cluster (3 masters, 1 replica each) using the containers' network IPs:
#   IPS=$(for n in 1 2 3 4 5 6; do \
#     docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' redis-cluster-$n; done)
#   docker exec redis-cluster-1 redis-cli --cluster create \
#     $(echo $IPS | sed 's/ /:6379 /g'):6379 --cluster-replicas 1 --cluster-yes
#
#   docker compose -f compose.cluster.yaml down

name: redis-cluster-demo

x-node: &node
  image: 'redis:8.2'
  command:
    - 'redis-server'
    - '--port'
    - '6379'
    - '--cluster-enabled'
    - 'yes'
    - '--cluster-config-file'
    - 'nodes.conf'
    - '--cluster-node-timeout'
    - '5000'
    - '--appendonly'
    - 'yes'

services:
  node-1:
    <<: *node
    container_name: 'redis-cluster-1'
    ports:
      - '7001:6379'
  node-2:
    <<: *node
    container_name: 'redis-cluster-2'
    ports:
      - '7002:6379'
  node-3:
    <<: *node
    container_name: 'redis-cluster-3'
    ports:
      - '7003:6379'
  node-4:
    <<: *node
    container_name: 'redis-cluster-4'
    ports:
      - '7004:6379'
  node-5:
    <<: *node
    container_name: 'redis-cluster-5'
    ports:
      - '7005:6379'
  node-6:
    <<: *node
    container_name: 'redis-cluster-6'
    ports:
      - '7006:6379'
